<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recensioni - Leonardo</title>
<link rel="stylesheet" href="style.css">
<style>
  body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(to right, #1e3c72, #2a5298);
    color: #fff;
    margin:0;
  }

  .navbar {
    display:flex;
    justify-content:space-between;
    padding:20px;
    background: rgba(0,0,0,0.3);
  }

  .navbar ul {
    list-style:none;
    display:flex;
    gap:20px;
  }

  .navbar a {
    text-decoration:none;
    color:#fff;
    transition:0.3s;
  }

  .navbar a:hover {
    color:#00f0ff;
  }

  .logo {
    font-weight:700;
    font-size:1.8rem;
    color:#00f0ff;
  }

  /* SEZIONE RECENSIONI */
  .reviews {
    max-width:600px;
    margin:80px auto;
    text-align:center;
    background: rgba(0,0,0,0.3);
    padding:40px;
    border-radius:15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }

  .reviews h1 {
    margin-bottom:30px;
    font-size:2rem;
    color:#00f0ff;
    text-shadow: 0 0 10px #00f0ff;
  }

  input, textarea {
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin-bottom:15px;
    font-size:1rem;
  }

  button {
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#00f0ff;
    color:#000;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
  }

  button:hover {
    background:#00c6ff;
    color:#fff;
    box-shadow: 0 0 15px #00f0ff;
  }

  .card {
    background: rgba(255,255,255,0.1);
    padding:15px 20px;
    border-radius:12px;
    margin-top:15px;
    text-align:left;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
    animation: fadeIn 0.5s ease-in;
  }

  .card h3 {
    margin:0 0 5px;
    color:#00f0ff;
  }

  @keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
  }
</style>
</head>
<body>

<nav class="navbar">
  <div class="logo">Leonardo</div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="calcolatrice.html">Calcolatrice</a></li>
    <li><a href="progetti.html">Progetti</a></li>
    <li><a href="chi-sono.html">Chi sono</a></li>
    <li><a href="conosciamoci.html">Conosciamoci</a></li>
    <li><a href="recensioni.html">Recensioni</a></li>
  </ul>
</nav>

<section class="reviews">
  <h1>Lascia una recensione ⭐</h1>

  <input type="text" id="nome" placeholder="Il tuo nome">
  <textarea id="testo" placeholder="Scrivi la tua recensione"></textarea>
  <button onclick="aggiungiRecensione()">Invia</button>

  <div id="listaRecensioni"></div>
</section>

<script>
function aggiungiRecensione(){
  let nome = document.getElementById("nome").value;
  let testo = document.getElementById("testo").value;

  if(nome === "" || testo === ""){
    alert("Compila tutti i campi!");
    return;
  }

  let recensioni = JSON.parse(localStorage.getItem("recensioni")) || [];
  recensioni.push({nome, testo});
  localStorage.setItem("recensioni", JSON.stringify(recensioni));

  mostraRecensioni();
  document.getElementById("nome").value = "";
  document.getElementById("testo").value = "";
}

function mostraRecensioni(){
  let lista = document.getElementById("listaRecensioni");
  let recensioni = JSON.parse(localStorage.getItem("recensioni")) || [];
  lista.innerHTML = "";
  recensioni.forEach(r => {
    lista.innerHTML += `
      <div class="card">
        <h3>${r.nome}</h3>
        <p>${r.testo}</p>
      </div>
    `;
  });
}

mostraRecensioni();
</script>
</body>
</html>


<nav class="navbar">
  <div class="logo">Leonardo</div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="calcolatrice.html">Calcolatrice</a></li>

  </ul>
</nav>


<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcolatrice - Leosardo</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<section class="calc-section">
  <h1>Calcolatrice Professionale</h1>
  <div class="calc-box">
    <input type="number" id="num1" placeholder="Numero 1">
    <input type="number" id="num2" placeholder="Numero 2">
    <div class="calc-buttons">
      <button onclick="calcola('+')">+</button>
      <button onclick="calcola('-')">-</button>
      <button onclick="calcola('*')">*</button>
      <button onclick="calcola('/')">/</button>
    </div>
    <p id="risultato">Risultato: </p>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
