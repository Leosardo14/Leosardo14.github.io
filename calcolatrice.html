<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcolatrice - Leosardo</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<section class="calc-section">
  <h1>Calcolatrice Professionale</h1>
  <div class="calc-box">
    <input type="number" id="num1" placeholder="Numero 1">
    <input type="number" id="num2" placeholder="Numero 2">
    <div class="calc-buttons">
      <button onclick="calcola('+')">+</button>
      <button onclick="calcola('-')">-</button>
      <button onclick="calcola('*')">*</button>
      <button onclick="calcola('/')">/</button>
    </div>
    <p id="risultato">Risultato: </p>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
